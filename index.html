    <style>
        /* ========== ROOT VARIABLES ========== */
        :root {
            --bg-primary: #0a0a0a;
            --bg-secondary: #111111;
            --bg-editor: #1a1a1a;
            --text-primary: #ffffff;
            --text-secondary: #888888;
            --text-bold: #ffffff;
            --border-color: #222222;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --tab-active: #2d2d2d;
            --tab-inactive: #1f1f1f;
        }

        /* Light Theme */
        .light-mode {
            --bg-primary: #f5f5f5;
            --bg-secondary: #ffffff;
            --bg-editor: #fafafa;
            --text-primary: #111111;
            --text-secondary: #666666;
            --text-bold: #000000;
            --border-color: #e5e5e5;
            --tab-active: #e5e5e5;
            --tab-inactive: #f0f0f0;
        }

        /* ========== GLOBAL STYLES ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        /* Bold text styles */
        .font-extrabold {
            font-weight: 800;
            color: var(--text-bold);
        }

        /* ========== CUSTOM SCROLLBAR ========== */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-secondary);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--text-secondary);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--accent);
        }

        /* ========== HEADER ========== */
        .header {
            background-color: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
            padding: 0.75rem 1.5rem;
        }

        .logo-box {
            width: 32px;
            height: 32px;
            background: var(--accent);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 1rem;
            color: white;
            transition: all 0.3s ease;
        }

        .logo-box:hover {
            transform: scale(1.05);
            background: var(--accent-hover);
        }

        .favicon-img {
            width: 24px;
            height: 24px;
            border-radius: 4px;
            object-fit: cover;
        }

        .title {
            font-weight: 800;
            font-size: 1.35rem;
            letter-spacing: -0.02em;
            color: var(--text-bold);
        }

        .badge {
            background: rgba(59, 130, 246, 0.1);
            color: var(--accent);
            padding: 0.2rem 0.6rem;
            border-radius: 20px;
            font-size: 0.65rem;
            font-weight: 600;
            border: 1px solid rgba(59, 130, 246, 0.2);
        }

        /* ========== THEME TOGGLE ========== */
        .theme-toggle {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: var(--bg-editor);
            border: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            color: var(--text-secondary);
        }

        .theme-toggle:hover {
            background: var(--accent);
            color: white;
            transform: rotate(45deg);
        }

        /* ========== TABS ========== */
        .tabs {
            display: flex;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
            padding: 0 1.5rem;
        }

        .tab {
            padding: 0.75rem 1.5rem;
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-secondary);
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .tab i {
            font-size: 1.1rem;
        }

        .tab:hover {
            color: var(--accent);
        }

        .tab.active {
            color: var(--accent);
            border-bottom-color: var(--accent);
            background: linear-gradient(to top, rgba(59, 130, 246, 0.05), transparent);
        }

        /* ========== EDITOR CONTAINER ========== */
        .editor-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: var(--bg-editor);
        }

        .code-panel {
            display: none;

            position: relative;
        }

        .code-panel.active {

        /* CodeMirror Customization */
        .CodeMirror {
            height: 100% !important;

            font-size: 14px !important;
            line-height: 1.6 !important;
            background: var(--bg-editor) !important;

        }

        .CodeMirror-gutters {
            background: var(--bg-secondary) !important;
            border-right: 1px solid var(--border-color) !important;
        }

        .CodeMirror-linenumber {
            color: var(--text-secondary) !important;

        .CodeMirror-cursor {

        /* Auto-complete dropdown */
        .CodeMirror-hints {

            overflow: hidden;
            list-style: none;
            margin: 0;

            background: var(--bg-secondary) !important;
            border: 1px solid var(--border-color) !important;

        .CodeMirror-hint {
            margin: 2px;
            padding: 6px 12px;
            border-radius: 4px;
            white-space: pre;
            color: var(--text-primary);
            cursor: pointer;
            transition: all 0.2s ease;
        }

        li.CodeMirror-hint-active {
            background: var(--accent) !important;
            color: white !important;
        }

        /* ========== TOOLBAR ========== */

    </style>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/addon/fold/foldcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/addon/fold/foldgutter.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/addon/fold/brace-fold.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/addon/fold/xml-fold.min.js"></script>

    <script>
        // Initialize CodeMirror editors with autocomplete
        const htmlEditor = CodeMirror.fromTextArea(document.getElementById('html-code'), {
            mode: 'htmlmixed',
            theme: 'dracula',
            lineNumbers: true,
            autoCloseTags: true,
            matchBrackets: true,
            indentUnit: 4,
            tabSize: 4,
            lineWrapping: true,
            extraKeys: {
                'Ctrl-Space': 'autocomplete',
                'Ctrl-/': 'toggleComment',
                'Ctrl-D': 'deleteLine',
                'Ctrl-Z': 'undo',
                'Ctrl-Shift-Z': 'redo'
            },
            hintOptions: {
                completeSingle: false,
                hint: function(cm) {
                    const cur = cm.getCursor();
                    const token = cm.getTokenAt(cur);
                    
                    if (cm.getMode().name === 'htmlmixed') {
                        return CodeMirror.hint.html(cm);
                    } else if (cm.getMode().name === 'css') {
                        return CodeMirror.hint.css(cm);
                    } else if (cm.getMode().name === 'javascript') {
                        return CodeMirror.hint.javascript(cm);
                    }
                }
            }
        });

        const cssEditor = CodeMirror.fromTextArea(document.getElementById('css-code'), {
            mode: 'css',
            theme: 'dracula',
            lineNumbers: true,
            autoCloseTags: true,
            matchBrackets: true,
            indentUnit: 4,
            tabSize: 4,
            lineWrapping: true,
            extraKeys: {
                'Ctrl-Space': 'autocomplete',
                'Ctrl-/': 'toggleComment',
                'Ctrl-D': 'deleteLine',
                'Ctrl-Z': 'undo',
                'Ctrl-Shift-Z': 'redo'
            },
            hintOptions: {
                completeSingle: false,
                hint: CodeMirror.hint.css
            }
        });

        const jsEditor = CodeMirror.fromTextArea(document.getElementById('js-code'), {
            mode: 'javascript',
            theme: 'dracula',
            lineNumbers: true,
            autoCloseTags: true,
            matchBrackets: true,
            indentUnit: 4,
            tabSize: 4,
            lineWrapping: true,
            extraKeys: {
                'Ctrl-Space': 'autocomplete',
                'Ctrl-/': 'toggleComment',
                'Ctrl-D': 'deleteLine',
                'Ctrl-Z': 'undo',
                'Ctrl-Shift-Z': 'redo'
            },
            hintOptions: {
                completeSingle: false,
                hint: CodeMirror.hint.javascript
            }
        });

        // Enable autocomplete on typing
        function autoCompleteOnTyping(cm) {
            cm.showHint({ completeSingle: false });
        }

        htmlEditor.on('inputRead', autoCompleteOnTyping);
        cssEditor.on('inputRead', autoCompleteOnTyping);
        jsEditor.on('inputRead', autoCompleteOnTyping);

        // Theme toggle
        function toggleTheme() {
            const body = document.body;
            const themeToggle = document.getElementById('themeToggle');
            const icon = themeToggle.querySelector('i');
            
            body.classList.toggle('light-mode');
            
            if (body.classList.contains('light-mode')) {
                icon.className = 'fas fa-sun';
                htmlEditor.setOption('theme', 'material-darker');
                cssEditor.setOption('theme', 'material-darker');
                jsEditor.setOption('theme', 'material-darker');
            } else {
                icon.className = 'fas fa-moon';
                htmlEditor.setOption('theme', 'dracula');
                cssEditor.setOption('theme', 'dracula');
                jsEditor.setOption('theme', 'dracula');
            }
        }

        // Switch tabs
        function switchTab(tab, event) {
            // Update tab classes
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.currentTarget.classList.add('active');
            
            // Update panels
            document.querySelectorAll('.code-panel').forEach(p => p.classList.remove('active'));
            document.getElementById(`${tab}-panel`).classList.add('active');
            
            // Refresh editor for better rendering
            if (tab === 'html') htmlEditor.refresh();
            if (tab === 'css') cssEditor.refresh();
            if (tab === 'js') jsEditor.refresh();
        }

        // Run code
        function runCode() {
            const html = htmlEditor.getValue();
            const css = cssEditor.getValue();
            const js = jsEditor.getValue();
            
            const combinedCode = `
                <!DOCTYPE html>
                <html>
                <head>
                    <meta charset="UTF-8">
                    <meta name="viewport" content="width=device-width, initial-scale=1.0">
                    <style>${css}</style>
                </head>
                <body>
                    ${html}
                    <script>${js}<\/script>
                </body>
                </html>
            `;
            
            const blob = new Blob([combinedCode], { type: 'text/html' });
            const url = URL.createObjectURL(blob);
            window.open(url, '_blank');
        }

        // Format code
        function formatCode() {
            const activePanel = document.querySelector('.code-panel.active');
            if (activePanel.id === 'html-panel') {
                htmlEditor.execCommand('selectAll');
                htmlEditor.execCommand('indentAuto');
            } else if (activePanel.id === 'css-panel') {
                cssEditor.execCommand('selectAll');
                cssEditor.execCommand('indentAuto');
            } else if (activePanel.id === 'js-panel') {
                jsEditor.execCommand('selectAll');
                jsEditor.execCommand('indentAuto');
            }
        }

        // Clear current editor
        function clearEditor() {
            if (confirm('Clear all code in this panel?')) {
                const activePanel = document.querySelector('.code-panel.active');
                if (activePanel.id === 'html-panel') {
                    htmlEditor.setValue('');
                } else if (activePanel.id === 'css-panel') {
                    cssEditor.setValue('');
                } else if (activePanel.id === 'js-panel') {
                    jsEditor.setValue('');
                }
            }
        }

        // Save code to file
        function saveCode() {
            const html = htmlEditor.getValue();
            const css = cssEditor.getValue();
            const js = jsEditor.getValue();
            
            const timestamp = new Date().toISOString().replace(/[:.]/g, '-');
            const content = `<!-- HTML -->\n${html}\n\n/* CSS */\n${css}\n\n// JavaScript\n${js}`;
            const blob = new Blob([content], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            
            const a = document.createElement('a');
            a.href = url;
            a.download = `code-${timestamp}.txt`;
            a.click();
            
            URL.revokeObjectURL(url);
        }

        // Copy code to clipboard
        function copyCode() {
            const activePanel = document.querySelector('.code-panel.active');
            let code = '';
            
            if (activePanel.id === 'html-panel') {
                code = htmlEditor.getValue();
            } else if (activePanel.id === 'css-panel') {
                code = cssEditor.getValue();
            } else if (activePanel.id === 'js-panel') {
                code = jsEditor.getValue();
            }
            
            navigator.clipboard.writeText(code).then(() => {
                alert('Code copied to clipboard!');
            });
        }

        // Auto-save to localStorage
        function saveToStorage() {
            localStorage.setItem('livecode_html', htmlEditor.getValue());
            localStorage.setItem('livecode_css', cssEditor.getValue());
            localStorage.setItem('livecode_js', jsEditor.getValue());
        }

        function loadFromStorage() {
            const html = localStorage.getItem('livecode_html');
            const css = localStorage.getItem('livecode_css');
            const js = localStorage.getItem('livecode_js');
            
            if (html) htmlEditor.setValue(html);
            if (css) cssEditor.setValue(css);
            if (js) jsEditor.setValue(js);
        }

        // Load saved code on startup
        loadFromStorage();

        // Auto-save every 30 seconds
        setInterval(saveToStorage, 30000);

        // Keyboard shortcuts for run
        document.addEventListener('keydown', (e) => {
            if (e.ctrlKey && e.key === 'Enter') {
                runCode();
            }
        });
    </script>
</body>
</html>
